function formatCurrency(n) {
  const value = Number.isFinite(Number(n)) ? Number(n) : 0;
  return '$' + Math.round(value).toLocaleString(APP_LOCALE);
}

function billMoneyDisplay(input) {
  const value = Math.max(0, parseInt(String(input || '0').replace(/\D/g, ''), 10) || 0);
  return formatCurrency(value);
}

function keyPress(key) {
  if (key === 'backspace') {
    calcInput = calcInput.length > 1 ? calcInput.slice(0, -1) : '0';
  } else if (key === '00') {
    if (calcInput === '0') return;
    if (calcInput.length <= 7) calcInput += '00';
  } else if (/^\d$/.test(String(key))) {
    if (calcInput.replace(/^0/, '').length >= 8) return;
    calcInput = calcInput === '0' ? String(key) : calcInput + String(key);
  }
  calcInput = String(Math.max(0, parseInt(calcInput.replace(/\D/g, ''), 10) || 0));
  updateBillDisplay(calcInput);
}

function updateBillDisplay(input) {
  const amount = parseInt(String(input || '0').replace(/\D/g, ''), 10) || 0;
  const amountEl = document.getElementById('bill-amount');
  const minsEl = document.getElementById('bill-minutes');
  const captionEl = document.getElementById('bill-caption');
  const timeLabelEl = document.getElementById('bill-time-label');
  const dividerEl = document.getElementById('bill-divider');
  if (amountEl) amountEl.textContent = formatCurrency(amount);
  if (minsEl) { minsEl.textContent = ''; minsEl.style.display = 'none'; }
  if (captionEl) { captionEl.textContent = ''; captionEl.style.display = 'none'; }
  if (timeLabelEl) timeLabelEl.style.display = 'none';
  if (dividerEl) dividerEl.style.display = 'none';
}

function comparisonLabel(period) {
  if (period === 'daily') return t('與昨天相比');
  if (period === 'weekly') return t('與上週相比');
  if (period === 'monthly') return t('與上月相比');
  if (period === 'yearly') return t('與去年相比');
  return t('本期比較');
}

function formatPeriodChange(current, previous, period) {
  const diff = Math.round(current - previous);
  const label = comparisonLabel(period);
  if (previous <= 0) return { text: t('還沒有上期資料'), cls: 'neutral', label };
  if (diff > 0) return { text: `+${formatCurrency(diff)} ${label}`, cls: 'positive', label };
  if (diff < 0) return { text: `${formatCurrency(Math.abs(diff))} ${t('比上期少')}`, cls: 'negative', label };
  return { text: t('與上期相同'), cls: 'neutral', label };
}

function makeTrendBuckets(period, entries) {
  const { start } = getPeriodRange(period);
  const buckets = [];
  if (period === 'daily') {
    const labels = [t('早上'), t('中午'), t('下午'), t('晚上')];
    for (let i = 0; i < 4; i++) buckets.push({ label: labels[i], total: 0, entries: [] });
    entries.forEach(entry => {
      const h = new Date(entry.timestamp).getHours();
      const idx = h < 11 ? 0 : h < 15 ? 1 : h < 19 ? 2 : 3;
      buckets[idx].total += Number(entry.amount || 0);
      buckets[idx].entries.push(entry);
    });
  } else if (period === 'weekly') {
    for (let i = 0; i < 7; i++) {
      const d = new Date(start); d.setDate(start.getDate() + i);
      buckets.push({ label: d.toLocaleDateString(APP_LOCALE, { weekday: 'short' }), total: 0, entries: [] });
    }
    entries.forEach(entry => {
      const d = new Date(entry.timestamp);
      const idx = Math.max(0, Math.min(6, Math.floor((new Date(d.getFullYear(), d.getMonth(), d.getDate()) - start) / 86400000)));
      buckets[idx].total += Number(entry.amount || 0);
      buckets[idx].entries.push(entry);
    });
  } else if (period === 'monthly') {
    for (let i = 0; i < 5; i++) buckets.push({ label: t(`第${i + 1}週`), total: 0, entries: [] });
    entries.forEach(entry => {
      const idx = Math.min(4, Math.floor((new Date(entry.timestamp).getDate() - 1) / 7));
      buckets[idx].total += Number(entry.amount || 0);
      buckets[idx].entries.push(entry);
    });
  } else {
    for (let i = 0; i < 12; i++) {
      const d = new Date(start.getFullYear(), i, 1);
      buckets.push({ label: d.toLocaleDateString(APP_LOCALE, { month: 'short' }), total: 0, entries: [] });
    }
    entries.forEach(entry => {
      const idx = new Date(entry.timestamp).getMonth();
      buckets[idx].total += Number(entry.amount || 0);
      buckets[idx].entries.push(entry);
    });
  }
  return buckets;
}

function renderTrend(entries, period) {
  const buckets = makeTrendBuckets(period, entries);
  const max = Math.max(...buckets.map(bucket => bucket.total), 0);
  if (!max) return `<div class="analytics-empty-card">${t('本期沒有支出')}</div>`;
  return `<div class="analytics-trend-list">${buckets.map(bucket => {
    const width = bucket.total ? Math.max(4, bucket.total / max * 100) : 0;
    return `
      <div class="analytics-trend-row" role="button" tabindex="0" onclick="showAnalyticsDetail('trend','${encodeURIComponent(bucket.label)}')">
        <div class="analytics-trend-label">${escapeHtml(bucket.label)}</div>
        <div class="analytics-trend-shell"><div class="analytics-trend-fill" style="width:${width}%"></div></div>
        <div class="analytics-trend-amount">${formatCurrency(bucket.total)}</div>
      </div>`;
  }).join('')}</div>`;
}

function renderCategoryBreakdown(entries, limit = 6) {
  const stats = getCategoryStats(entries).slice(0, limit);
  if (!stats.length) return `<div class="analytics-empty-card">${t('沒有分類資料')}</div>`;
  const total = sumEntries(entries) || 1;
  const max = Math.max(...stats.map(item => item.total), 1);
  return stats.map(item => {
    const pct = Math.round(item.total / total * 100);
    const width = Math.max(4, item.total / max * 100);
    const avg = item.total / Math.max(1, item.count);
    return `
      <div class="analytics-category-card" role="button" tabindex="0" onclick="showAnalyticsDetail('category','${encodeURIComponent(item.category)}')">
        <div class="analytics-category-topline">
          <div class="analytics-category-name">${escapeHtml(t(item.category))}</div>
          <div class="analytics-category-amount">${formatCurrency(item.total)}</div>
        </div>
        <div class="analytics-progress-shell"><div class="analytics-progress-fill" style="width:${width}%"></div></div>
        <div class="analytics-card-meta">${item.count} ${t('支出筆數')} · ${formatCurrency(avg)} ${t('每筆平均')} · ${pct}% ${t('佔本期')}</div>
      </div>`;
  }).join('');
}

function buildNotableCards(entries, previousEntries, period) {
  const cards = [];
  const total = sumEntries(entries);
  const previousTotal = sumEntries(previousEntries);
  const change = formatPeriodChange(total, previousTotal, period);
  const largest = entries.length ? entries.reduce((max, entry) => Number(entry.amount || 0) > Number(max.amount || 0) ? entry : max, entries[0]) : null;
  const repeat = getCategoryStats(entries).find(item => item.count >= 2);

  if (previousTotal > 0) {
    const diff = Math.round(total - previousTotal);
    const verb = diff > 0 ? t('比上期多') : diff < 0 ? t('比上期少') : t('與上期相同');
    cards.push(`
      <div class="analytics-action-card" role="button" tabindex="0" onclick="showAnalyticsDetail('compare')">
        <div class="analytics-action-icon">↔️</div>
        <div class="analytics-action-topline">
          <div class="analytics-action-title">${t('變化')}</div>
          <div class="analytics-action-value">${diff === 0 ? '—' : formatCurrency(Math.abs(diff))}</div>
        </div>
        <div class="analytics-action-note">${verb} · ${formatCurrency(total)} ${t('本期支出')} / ${formatCurrency(previousTotal)} ${t('上期支出')}</div>
      </div>`);
  }

  if (largest) {
    cards.push(`
      <div class="analytics-action-card" role="button" tabindex="0" onclick="openEntryModal('${largest.id}')">
        <div class="analytics-action-icon">💳</div>
        <div class="analytics-action-topline">
          <div class="analytics-action-title">${t('最大支出')}</div>
          <div class="analytics-action-value">${formatCurrency(largest.amount)}</div>
        </div>
        <div class="analytics-action-note">${escapeHtml(largest.name || t('未命名支出'))} · ${escapeHtml(t(largest.category || '❓ 其他'))}</div>
      </div>`);
  }

  if (repeat) {
    cards.push(`
      <div class="analytics-action-card" role="button" tabindex="0" onclick="showAnalyticsDetail('category','${encodeURIComponent(repeat.category)}')">
        <div class="analytics-action-icon">🔁</div>
        <div class="analytics-action-topline">
          <div class="analytics-action-title">${t('重複支出')}</div>
          <div class="analytics-action-value">${repeat.count}×</div>
        </div>
        <div class="analytics-action-note">${escapeHtml(t(repeat.category))} · ${formatCurrency(repeat.total)} total</div>
      </div>`);
  }

  if (!cards.length) return `<div class="analytics-empty-card">${t('新增幾筆支出後，Benjamin 會整理分類、趨勢與比較。')}</div>`;
  return `<div class="analytics-action-grid">${cards.join('')}</div>`;
}

function renderHistory() {
  const body = document.getElementById('history-body');
  if (!body) return;
  const entries = getFilteredEntries(historyPeriod);

  if (entries.length === 0) {
    body.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">🧾</div>
        <div class="empty-state-title">${t('目前沒有支出')}</div>
        <div class="empty-state-text">${t('新增的支出會顯示在這裡。')}</div>
      </div>`;
    scheduleLocalize(body);
    return;
  }

  const total = sumEntries(entries);
  const avg = total / entries.length;
  const largest = entries.reduce((max, entry) => Number(entry.amount || 0) > Number(max.amount || 0) ? entry : max, entries[0]);

  let html = `
    <div class="stats-grid benjamin-summary">
      <div class="stat-card stat-card-wide">
        <div class="stat-label">${t('總支出')}</div>
        <div class="stat-value">${formatCurrency(total)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">${t('支出筆數')}</div>
        <div class="stat-value">${entries.length}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">${t('平均每筆')}</div>
        <div class="stat-value">${formatCurrency(avg)}</div>
      </div>
      <div class="stat-card stat-card-wide">
        <div class="stat-label">${t('最高單筆')}</div>
        <div class="stat-value">${formatCurrency(largest.amount)}</div>
        <div class="stat-sub">${escapeHtml(largest.name || t('未命名支出'))}</div>
      </div>
    </div>`;

  const groups = {};
  entries.forEach(entry => {
    const label = new Date(entry.timestamp).toLocaleDateString(APP_LOCALE, { weekday: 'long', month: 'short', day: 'numeric' });
    (groups[label] = groups[label] || []).push(entry);
  });

  for (const [dateLabel, group] of Object.entries(groups)) {
    html += `<div class="date-group"><div class="date-group-label">${escapeHtml(dateLabel)}</div>`;
    group.forEach(entry => { html += renderEntryCard(entry, 'history'); });
    html += '</div>';
  }

  body.innerHTML = html;
  scheduleLocalize(body);
}

function renderAnalytics() {
  const body = document.getElementById('analytics-body') || document.getElementById('watchlist-body');
  if (!body) return;
  const entries = getFilteredEntries(analyticsPeriod);
  const previousEntries = getPreviousEntries(analyticsPeriod);
  const total = sumEntries(entries);
  const previousTotal = sumEntries(previousEntries);
  const comparison = formatPeriodChange(total, previousTotal, analyticsPeriod);
  const avg = entries.length ? total / entries.length : 0;

  if (entries.length === 0) {
    body.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">📊</div>
        <div class="empty-state-title">${t('目前沒有分析資料')}</div>
        <div class="empty-state-text">${t('新增幾筆支出後，Benjamin 會整理分類、趨勢與比較。')}</div>
      </div>`;
    scheduleLocalize(body);
    return;
  }

  body.innerHTML = `
    <div class="analytics-stack">
      <div class="analytics-hero" role="button" tabindex="0" onclick="showAnalyticsDetail('summary')">
        <div class="analytics-eyebrow">${t('總支出')}</div>
        <div class="analytics-hero-value">${formatCurrency(total)}</div>
        <div class="analytics-hero-sub analytics-delta ${comparison.cls}">${comparison.text}</div>
      </div>

      <div class="analytics-mini-grid">
        <div class="analytics-mini-card" role="button" tabindex="0" onclick="showAnalyticsDetail('summary')">
          <div class="analytics-card-title">${t('購買數')}</div>
          <div class="analytics-mini-value">${entries.length}</div>
          <div class="analytics-mini-sub">${t('本期支出')}</div>
        </div>
        <div class="analytics-mini-card" role="button" tabindex="0" onclick="showAnalyticsDetail('summary')">
          <div class="analytics-card-title">${t('平均購買')}</div>
          <div class="analytics-mini-value">${formatCurrency(avg)}</div>
          <div class="analytics-mini-sub">${entries.length} ${t('支出筆數')}</div>
        </div>
      </div>

      <section class="analytics-section">
        <div class="analytics-section-title">${t('錢花到哪裡')}</div>
        ${renderCategoryBreakdown(entries, 6)}
      </section>

      <section class="analytics-section">
        <div class="analytics-section-title">${t('支出時間分布')}</div>
        <div class="analytics-trend-card" role="button" tabindex="0" onclick="showAnalyticsDetail('trend')">
          ${renderTrend(entries, analyticsPeriod)}
          <div class="analytics-trend-meta">${t('點擊查看明細')}</div>
        </div>
      </section>

      <section class="analytics-section">
        <div class="analytics-section-title">${t('值得注意')}</div>
        ${buildNotableCards(entries, previousEntries, analyticsPeriod)}
      </section>
    </div>`;
  scheduleLocalize(body);
}

function analyticsRowsForEntries(entries) {
  if (!entries.length) return `<div class="analytics-empty-card">${t('本期沒有支出')}</div>`;
  return `<div class="analytics-modal-list">${entries.slice(0, 12).map(entry => `
    <div class="analytics-modal-row">
      <div>
        <div>${escapeHtml(entry.name || t('未命名支出'))}</div>
        <div class="analytics-modal-muted">${escapeHtml(t(entry.category || '❓ 其他'))} · ${formatEntryTimestamp(entry.timestamp)}</div>
      </div>
      <strong>${formatCurrency(entry.amount)}</strong>
    </div>`).join('')}</div>`;
}

function showAnalyticsDetail(type, encodedKey = '') {
  const entries = getFilteredEntries(analyticsPeriod);
  const previousEntries = getPreviousEntries(analyticsPeriod);
  const key = encodedKey ? decodeURIComponent(encodedKey) : '';
  let title = t('明細');
  let body = '';

  if (type === 'summary') {
    title = t('總支出');
    body = `
      <div class="analytics-modal-list">
        <div class="analytics-modal-row"><span>${t('本期支出')}</span><strong>${formatCurrency(sumEntries(entries))}</strong></div>
        <div class="analytics-modal-row"><span>${t('支出筆數')}</span><strong>${entries.length}</strong></div>
        <div class="analytics-modal-row"><span>${t('平均每筆')}</span><strong>${formatCurrency(entries.length ? sumEntries(entries) / entries.length : 0)}</strong></div>
      </div>`;
  } else if (type === 'category') {
    const filtered = entries.filter(entry => (entry.category || '❓ 其他') === key);
    const total = sumEntries(filtered);
    title = t('分類明細');
    body = `<div class="confirm-text">${escapeHtml(t(key))} · ${formatCurrency(total)} · ${filtered.length} ${t('支出筆數')}</div>${analyticsRowsForEntries(filtered)}`;
  } else if (type === 'trend') {
    title = t('趨勢明細');
    const buckets = makeTrendBuckets(analyticsPeriod, entries);
    body = `<div class="analytics-modal-list">${buckets.map(bucket => `
      <div class="analytics-modal-row">
        <span>${escapeHtml(bucket.label)}</span>
        <strong>${formatCurrency(bucket.total)}</strong>
      </div>`).join('')}</div>`;
  } else if (type === 'compare') {
    title = t('變化');
    body = `
      <div class="analytics-modal-list">
        <div class="analytics-modal-row"><span>${t('本期支出')}</span><strong>${formatCurrency(sumEntries(entries))}</strong></div>
        <div class="analytics-modal-row"><span>${t('上期支出')}</span><strong>${formatCurrency(sumEntries(previousEntries))}</strong></div>
      </div>`;
  }

  const modal = document.getElementById('modal-content');
  if (!modal) return;
  modal.innerHTML = `
    <button class="modal-close-btn" type="button" onclick="closeModal()" aria-label="${t('關閉')}">×</button>
    <div class="modal-title">${title}</div>
    ${body}
    <div class="modal-actions"><button class="btn-modal-cancel" type="button" onclick="closeModal()">${t('關閉')}</button></div>`;
  openModal();
  scheduleLocalize(modal);
}

/* ============================================================
   APP INITIALIZATION
   ============================================================ */
function init() {
  ensureLocalUserData();
  setupNumericInputs();
  postLogin();
  startLanguageObserver();
  scheduleLocalize(document.body);
  document.body.classList.remove('app-booting');
}

/* Register PWA service worker */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () =>
    navigator.serviceWorker.register('sw.js').catch(() => {})
  );
}

try { init(); } finally { document.body.classList.remove('app-booting'); }
</script>

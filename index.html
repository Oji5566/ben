<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Benjamin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f7f4ef">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Benjamin">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght,ROND@6..144,400..800,100&display=swap" rel="stylesheet">
  <style>

    :root {
      --color-brand:        #0F6CBD;
      --color-bg-1:         #FFFFFF;
      --color-bg-2:         #F3F2F1;
      --color-fg-1:         #242424;
      --color-fg-2:         #616161;
      --color-stroke-1:     #E0E0E0;
      --color-success:      #107C10;
      --color-error:        #D13438;
      --color-brand-tint:   #E5F1FB;

      --radius-sm:          4px;
      --radius-md:          8px;
      --radius-lg:          12px;
      --radius-xl:          16px;
      --radius-circular:    9999px;

      --shadow-2: 0 1px 2px rgba(0,0,0,.14), 0 0 2px rgba(0,0,0,.12);
      --shadow-4: 0 2px 4px rgba(0,0,0,.14), 0 0 2px rgba(0,0,0,.12);
      --shadow-8: 0 4px 8px rgba(0,0,0,.14), 0 0 2px rgba(0,0,0,.12);

      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;

      --t-fast:   150ms ease;
      --t-normal: 250ms ease;
      --t-slow:   350ms ease;
    }

    /* ============================================================
       RESET & BASE
       ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%; overflow: hidden;
      font-family: var(--font);
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    }

    /* ============================================================
       APP SHELL — full-screen on mobile, phone frame on desktop
       ============================================================ */
    #app-wrapper {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
    }

    #app {
      position: relative;
      width: 100%; height: 100%;
      background: var(--color-bg-2);
      overflow: hidden;
    }

    @media (min-width: 500px) {
      #app {
        width: 430px; height: 844px;
        border-radius: 50px;
        box-shadow: 0 30px 80px rgba(0,0,0,.55), 0 0 0 2px rgba(255,255,255,.1);
      }
    }

    /* ============================================================
       SCREENS
       ============================================================ */
    .screen {
      position: absolute; inset: 0;
      display: none; flex-direction: column;
      background: var(--color-bg-2);
    }
    .screen.active { display: flex; }

    /* ============================================================
       AUTH SCREEN
       ============================================================ */
    #screen-auth {
      background: var(--color-bg-1);
      align-items: center;
      justify-content: flex-start;
      padding: 0;
      overflow-y: auto;
    }

    .auth-inner {
      width: 100%;
      max-width: 380px;
      padding: 48px 28px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .auth-logo {
      width: 76px; height: 76px;
      background: var(--color-brand);
      border-radius: var(--radius-xl);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 20px;
      box-shadow: var(--shadow-8);
    }
    .auth-logo svg { width: 44px; height: 44px; fill: white; }

    .auth-title {
      font-size: 28px; font-weight: 700;
      color: var(--color-fg-1); margin-bottom: 6px;
    }
    .auth-subtitle {
      font-size: 15px; color: var(--color-fg-2);
      margin-bottom: 36px; text-align: center;
    }

    .auth-form { width: 100%; display: flex; flex-direction: column; gap: 12px; }

    .input-group  { display: flex; flex-direction: column; gap: 4px; }
    .input-label  { font-size: 13px; font-weight: 600; color: var(--color-fg-2); }

    .input-field {
      width: 100%; height: 48px;
      padding: 0 14px;
      border: 1.5px solid var(--color-stroke-1);
      border-radius: var(--radius-md);
      font-size: 16px; font-family: var(--font);
      color: var(--color-fg-1); background: var(--color-bg-1);
      outline: none;
      transition: border-color var(--t-fast);
    }
    .input-field:focus { border-color: var(--color-brand); }

    .btn-primary {
      width: 100%; height: 48px;
      background: var(--color-brand); color: white;
      border: none; border-radius: var(--radius-md);
      font-size: 16px; font-weight: 600; font-family: var(--font);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: opacity var(--t-fast), transform var(--t-fast);
    }
    .btn-primary:active { opacity: .85; transform: scale(.98); }

    .auth-toggle {
      margin-top: 20px;
      font-size: 14px; color: var(--color-fg-2); text-align: center;
    }
    .auth-toggle a { color: var(--color-brand); font-weight: 600; cursor: pointer; }

    .auth-mode-switch {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 24px;
    }
    .auth-mode-btn {
      min-height: 48px;
      border-radius: var(--radius-md);
      border: 1px solid var(--color-stroke-1);
      background: rgba(255,255,255,.06);
      color: var(--color-fg-2);
      font-size: 15px;
      font-weight: 700;
      font-family: var(--font);
      cursor: pointer;
      transition: background var(--t-fast), color var(--t-fast), border-color var(--t-fast), transform var(--t-fast);
    }
    .auth-mode-btn.active {
      background: linear-gradient(135deg, var(--color-brand), var(--color-brand-2));
      color: #fff;
      border-color: transparent;
      box-shadow: 0 20px 38px rgba(92,106,255,.24);
    }
    .auth-mode-btn:active { transform: scale(.98); }


    .error-msg {
      font-size: 13px; color: var(--color-error);
      background: #fee7e8; padding: 8px 12px;
      border-radius: var(--radius-sm);
      display: none;
    }
    .error-msg.visible { display: block; }

    /* ============================================================
       ONBOARDING SCREEN
       ============================================================ */
    #screen-onboarding {
      background: var(--color-bg-1);
      overflow: hidden;
    }

    .progress-dots {
      display: flex; gap: 6px; justify-content: center;
      padding: 20px 24px 0;
    }
    .progress-dot {
      width: 8px; height: 8px;
      border-radius: var(--radius-circular);
      background: var(--color-stroke-1);
      transition: background var(--t-normal), width var(--t-normal);
    }
    .progress-dot.active { background: var(--color-brand); width: 24px; }
    .progress-dot.done   { background: var(--color-brand); opacity: .4; }

    .onboarding-body {
      flex: 1; overflow: hidden;
      padding: 28px 24px 0;
      display: flex; flex-direction: column;
    }

    .onboarding-step { display: none; flex-direction: column; flex: 1; }
    .onboarding-step.active { display: flex; }

    .step-emoji   { font-size: 52px; margin-bottom: 14px; }
    .step-title   { font-size: 26px; font-weight: 700; color: var(--color-fg-1); margin-bottom: 8px; line-height: 1.2; }
    .step-subtitle{ font-size: 15px; color: var(--color-fg-2); margin-bottom: 28px; line-height: 1.55; }

    .step-content { flex: 1; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; }

    /* Radio options */
    .radio-group { display: flex; flex-direction: column; gap: 8px; }
    .radio-option {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px;
      border: 1.5px solid var(--color-stroke-1);
      border-radius: var(--radius-lg);
      cursor: pointer;
      transition: border-color var(--t-fast), background var(--t-fast);
    }
    .radio-option.selected { border-color: var(--color-brand); background: var(--color-brand-tint); }
    .radio-option input[type="radio"] { display: none; }
    .radio-dot {
      width: 20px; height: 20px;
      border-radius: var(--radius-circular);
      border: 2px solid var(--color-stroke-1);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: border-color var(--t-fast);
    }
    .radio-option.selected .radio-dot { border-color: var(--color-brand); }
    .radio-dot::after {
      content: ''; width: 10px; height: 10px;
      border-radius: var(--radius-circular);
      background: var(--color-brand);
      opacity: 0; transition: opacity var(--t-fast);
    }
    .radio-option.selected .radio-dot::after { opacity: 1; }
    .radio-label { font-size: 15px; font-weight: 600; color: var(--color-fg-1); }
    .radio-desc  { font-size: 13px; color: var(--color-fg-2); margin-top: 1px; }

    /* Toggle */
    .toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px;
      border: 1.5px solid var(--color-stroke-1);
      border-radius: var(--radius-lg);
    }
    .toggle-label { font-size: 15px; font-weight: 600; color: var(--color-fg-1); }

    .toggle {
      width: 50px; height: 28px;
      background: var(--color-stroke-1);
      border-radius: var(--radius-circular);
      position: relative;
      cursor: pointer; border: none; outline: none; flex-shrink: 0;
      transition: background var(--t-normal);
    }
    .toggle.on { background: var(--color-brand); }
    .toggle::after {
      content: '';
      position: absolute; top: 3px; left: 3px;
      width: 22px; height: 22px;
      background: white;
      border-radius: var(--radius-circular);
      box-shadow: var(--shadow-2);
      transition: transform var(--t-normal);
    }
    .toggle.on::after { transform: translateX(22px); }

    /* Rate highlight card */
    .result-highlight {
      background: var(--color-brand-tint);
      border: 1.5px solid var(--color-brand);
      border-radius: var(--radius-xl);
      padding: 24px; text-align: center;
    }
    .result-highlight .rate { font-size: 42px; font-weight: 800; color: var(--color-brand); }
    .result-highlight .rate-label { font-size: 15px; color: var(--color-fg-2); margin-top: 4px; }

    .onboarding-footer { padding: 16px 24px 36px; display: flex; flex-direction: column; gap: 8px; }

    .btn-back {
      background: none; border: none;
      color: var(--color-brand); font-size: 15px; font-family: var(--font);
      cursor: pointer; padding: 4px 0; text-align: left;
    }

    /* ============================================================
       APP SCREEN — tab layout
       ============================================================ */
    #screen-app { display: none; }
    #screen-app.active { display: flex; }

    /* Tab bar */
    .tab-bar {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 80px;
      background: var(--color-bg-1);
      border-top: 1px solid var(--color-stroke-1);
      display: flex; align-items: stretch;
      z-index: 100;
    }
    .tab-btn {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 3px;
      background: none; border: none;
      cursor: pointer;
      padding: 8px 0 18px;
      color: var(--color-fg-2);
      font-size: 11px; font-family: var(--font); font-weight: 500;
      transition: color var(--t-fast);
    }
    .tab-btn.active { color: var(--color-brand); }
    .tab-btn svg { width: 24px; height: 24px; }

    /* Tab content panes */
    .tab-content {
      display: none; flex-direction: column;
      position: absolute; top: 0; left: 0; right: 0; bottom: 80px;
      overflow-y: auto; -webkit-overflow-scrolling: touch;
    }
    .tab-content.active { display: flex; }

    /* ============================================================
       CALCULATOR TAB
       ============================================================ */
    #tab-calculator {
      padding: 16px; gap: 12px;
      overflow: hidden; /* keypad fills space, no scroll */
    }

    /* Dollar bill */
    .dollar-bill {
      background: #1b5e20;
      border-radius: var(--radius-xl);
      padding: 18px 20px;
      position: relative; overflow: hidden;
      flex-shrink: 0;
      min-height: 130px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      box-shadow: var(--shadow-8), inset 0 1px 0 rgba(255,255,255,.08);
    }
    /* Dashed inner border */
    .dollar-bill::before {
      content: '';
      position: absolute; top: 8px; left: 8px; right: 8px; bottom: 8px;
      border: 1.5px dashed rgba(255,255,255,.22);
      border-radius: var(--radius-lg);
      pointer-events: none;
    }
    /* Watermark */
    .dollar-bill::after {
      content: 'BENJI';
      position: absolute;
      font-size: 44px; font-weight: 900;
      color: rgba(255,255,255,.04);
      letter-spacing: 6px;
      pointer-events: none; user-select: none;
    }
    /* Decorative circles */
    .bill-circle {
      position: absolute;
      width: 76px; height: 76px;
      border-radius: var(--radius-circular);
      border: 1.5px dashed rgba(255,255,255,.18);
    }
    .bill-circle-left  { left: -38px; top: 50%; transform: translateY(-50%); }
    .bill-circle-right { right: -38px; top: 50%; transform: translateY(-50%); }

    .bill-amount {
      font-size: 50px; font-weight: 800; color: white;
      text-shadow: 0 2px 4px rgba(0,0,0,.3);
      line-height: 1; position: relative; z-index: 1;
      transition: transform 200ms ease;
    }
    .bill-amount.pulse { animation: billPulse 280ms cubic-bezier(.34,1.56,.64,1); }
    @keyframes billPulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
    .bill-minutes {
      font-size: 13px; color: rgba(255,255,255,.72);
      margin-top: 6px; position: relative; z-index: 1;
    }

    /* Keypad */
    .keypad-container {
      flex: 1; min-height: 0;
      display: flex; flex-direction: column; gap: 8px;
    }
    .keypad-grid {
      flex: 1; min-height: 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 8px;
    }
    .key-btn {
      background: var(--color-bg-1);
      border: none; border-radius: var(--radius-lg);
      font-size: 22px; font-weight: 500; font-family: var(--font);
      color: var(--color-fg-1);
      cursor: pointer;
      box-shadow: var(--shadow-2);
      display: flex; align-items: center; justify-content: center;
      transition: background var(--t-fast), transform var(--t-fast), box-shadow var(--t-fast);
      -webkit-tap-highlight-color: transparent;
      min-height: 48px;
    }
    .key-btn:active { background: var(--color-bg-2); transform: scale(.93); box-shadow: none; }
    .key-btn.key-delete { font-size: 18px; color: var(--color-fg-2); }

    .enter-btn {
      height: 50px; flex-shrink: 0;
      background: var(--color-brand); color: white;
      border: none; border-radius: var(--radius-lg);
      font-size: 17px; font-weight: 700; font-family: var(--font);
      cursor: pointer;
      box-shadow: var(--shadow-4);
      transition: opacity var(--t-fast), transform var(--t-fast);
      -webkit-tap-highlight-color: transparent;
    }
    .enter-btn:active { opacity: .86; transform: scale(.98); }

    /* ============================================================
       RESULT BOTTOM SHEET
       ============================================================ */
    .overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 200;
      opacity: 0; pointer-events: none;
      transition: opacity var(--t-normal);
    }
    .overlay.visible { opacity: 1; pointer-events: all; }

    .bottom-sheet {
      position: absolute; left: 0; right: 0; bottom: 0;
      background: var(--color-bg-1);
      border-radius: 20px 20px 0 0;
      padding: 0 20px 36px;
      z-index: 201;
      transform: translateY(100%);
      transition: transform var(--t-normal);
      box-shadow: 0 -4px 24px rgba(0,0,0,.15);
      max-height: 90%;
      overflow-y: auto;
    }
    .bottom-sheet.open { transform: translateY(0); }

    .sheet-handle {
      width: 36px; height: 4px;
      background: var(--color-stroke-1);
      border-radius: var(--radius-circular);
      margin: 12px auto 18px;
    }

    .sheet-result { text-align: left; margin-bottom: 20px; }
    .sheet-time   { font-size: 20px; font-weight: 700; color: var(--color-brand); }
    .sheet-amount-block { margin-top: 18px; }
    .sheet-amount { font-size: 34px; font-weight: 800; color: var(--color-fg-1); margin-top: 8px; display: block; }
    .sheet-equals { font-size: 16px; color: var(--color-fg-2); margin: 4px 0; }

    /* Action buttons */
    .action-buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 0; }
    .action-btn {
      flex: 1; height: 56px;
      border: none; border-radius: var(--radius-lg);
      font-size: 13px; font-weight: 700; font-family: var(--font);
      cursor: pointer;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 3px;
      transition: opacity var(--t-fast), transform var(--t-fast);
      -webkit-tap-highlight-color: transparent;
    }
    .action-btn:active  { opacity: .85; transform: scale(.95); }
    .action-btn .btn-em { font-size: 20px; }
    .action-btn.buy-btn    { background: #e8f5e9; color: var(--color-success); }
    .action-btn.watchlist-btn { background: rgba(255,214,10,.16); color: #b88600; }
    .action-btn.giveup-btn { background: #fdeeee; color: var(--color-error); }
    .action-btn.notrack-btn{ background: var(--color-bg-2); color: var(--color-fg-2); }
    .action-secondary-row {
      display: flex;
      justify-content: center;
      margin-top: 10px;
    }
    .action-btn-compact {
      width: calc((100% - 16px) / 3);
      min-height: 48px;
      font-size: 12px;
    }

    /* Entry form inside sheet */
    .sheet-form { display: none; flex-direction: column; gap: 12px; margin-top: 8px; }
    .sheet-form.visible { display: flex; }

    .categories-scroll {
      display: flex; gap: 8px;
      overflow-x: auto; padding-bottom: 4px;
      scrollbar-width: none;
    }
    .categories-scroll::-webkit-scrollbar { display: none; }

    .category-pill {
      padding: 8px 16px;
      background: var(--color-bg-2);
      border: 1.5px solid var(--color-stroke-1);
      border-radius: var(--radius-circular);
      font-size: 14px; white-space: nowrap;
      cursor: pointer; font-family: var(--font); color: var(--color-fg-1);
      transition: background var(--t-fast), border-color var(--t-fast);
      -webkit-tap-highlight-color: transparent;
    }
    .category-pill.selected {
      background: var(--color-brand-tint);
      border-color: var(--color-brand);
      color: var(--color-brand); font-weight: 600;
    }

    .sheet-save-row { display: flex; gap: 8px; }
    .btn-save {
      flex: 2; height: 48px;
      background: var(--color-brand); color: white;
      border: none; border-radius: var(--radius-md);
      font-size: 16px; font-weight: 600; font-family: var(--font);
      cursor: pointer;
    }
    .btn-cancel {
      flex: 1; height: 48px;
      background: var(--color-bg-2); color: var(--color-fg-2);
      border: none; border-radius: var(--radius-md);
      font-size: 16px; font-weight: 600; font-family: var(--font);
      cursor: pointer;
    }

    /* ============================================================
       SUCCESS OVERLAY
       ============================================================ */
    .success-overlay {
      position: absolute; inset: 0;
      background: rgba(255,255,255,.96);
      z-index: 300;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      opacity: 0; pointer-events: none;
      transition: opacity var(--t-normal);
    }
    .success-overlay.visible { opacity: 1; pointer-events: all; }

    .success-circle {
      width: 80px; height: 80px;
      border-radius: var(--radius-circular);
      background: var(--color-success);
      display: flex; align-items: center; justify-content: center;
    }
    .success-circle svg { width: 48px; height: 48px; }

    .checkmark-path {
      stroke-dasharray: 52;
      stroke-dashoffset: 52;
      animation: drawCheck 500ms ease forwards 100ms;
    }
    @keyframes drawCheck { to { stroke-dashoffset: 0; } }

    .success-text { font-size: 24px; font-weight: 700; color: var(--color-fg-1); }

    /* ============================================================
       HISTORY TAB
       ============================================================ */
    #tab-history { background: var(--color-bg-2); }

    .history-header {
      background: var(--color-bg-1);
      padding: 16px;
      border-bottom: 1px solid var(--color-stroke-1);
      position: sticky; top: 0; z-index: 10;
      flex-shrink: 0;
    }
    .history-title { font-size: 20px; font-weight: 700; color: var(--color-fg-1); margin-bottom: 12px; }

    /* Segmented control */
    .segmented-control {
      display: flex;
      background: var(--color-bg-2);
      border-radius: var(--radius-md);
      padding: 2px;
    }
    .seg-btn {
      flex: 1; height: 32px;
      background: none; border: none;
      border-radius: var(--radius-sm);
      font-size: 12px; font-weight: 600; font-family: var(--font);
      color: var(--color-fg-2);
      cursor: pointer;
      transition: background var(--t-fast), color var(--t-fast), box-shadow var(--t-fast);
    }
    .seg-btn.active { background: var(--color-bg-1); color: var(--color-fg-1); box-shadow: var(--shadow-2); }

    .history-body { padding: 16px; display: flex; flex-direction: column; gap: 16px; }

    /* Stats grid */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .stat-card {
      background: var(--color-bg-1);
      border-radius: var(--radius-lg);
      padding: 14px;
      box-shadow: var(--shadow-2);
    }
    .stat-label {
      font-size: 11px; font-weight: 700; color: var(--color-fg-2);
      text-transform: uppercase; letter-spacing: .5px; margin-bottom: 5px;
    }
    .stat-value { font-size: 22px; font-weight: 800; color: var(--color-fg-1); line-height: 1; }
    .stat-sub   { font-size: 12px; color: var(--color-fg-2); margin-top: 3px; }

    .ratio-card {
      background: var(--color-bg-1);

<body class="app-booting">
<div id="app-wrapper">

  <!-- ============================================================
       ONBOARDING SCREEN
       ============================================================ -->
  <div id="screen-onboarding" class="screen active">

      <div class="progress-dot"        data-dot="3"></div>
      <div class="progress-dot"        data-dot="4"></div>

    </div>

    <div class="onboarding-body">

      <!-- Step 1: Welcome -->
      <div class="onboarding-step active" data-step="1">
        <div class="step-emoji">👋</div>
        <div class="step-title">用時間看懂每一筆花費</div>
        <div class="step-subtitle">用更直覺的方式判斷一樣東西，是否值得你為它付出的工作時間。</div>
        <div class="step-content"></div>
      </div>

      <!-- Step 2: Income Type -->
      <div class="onboarding-step" data-step="2">
        <div class="step-emoji">💰</div>
        <div class="step-title">你的收入怎麼計算？</div>
        <div class="step-subtitle">我們會用這個來計算你的實際收入換算。</div>
        <div class="step-content">
          <div class="radio-group" id="income-type-group">
            <label class="radio-option selected" data-value="hourly">
              <input type="radio" name="incomeType" value="hourly" checked>
              <div class="radio-dot"></div>
              <div><div class="radio-label">時薪</div><div class="radio-desc">依實際工作時數計薪</div></div>
            </label>
            <label class="radio-option" data-value="monthly">
              <input type="radio" name="incomeType" value="monthly">
              <div class="radio-dot"></div>
              <div><div class="radio-label">月薪</div><div class="radio-desc">固定每月薪資</div></div>

          </div>
        </div>

      <!-- Step 3: Hours Worked -->

        <div class="step-emoji">⏰</div>
        <div class="step-title">每週工時</div>
        <div class="step-subtitle">你通常每週工作幾個小時？</div>

          <div class="input-group">
            <label class="input-label" for="onboarding-hours">每週工時</label>
            <input class="input-field" type="text" inputmode="numeric" pattern="[0-9]*" data-number-mode="integer" id="onboarding-hours" placeholder="40" value="40" min="1" max="168" autocomplete="off">
          </div>
        </div>
      </div>

      <!-- Step 4: Real Wages -->
      <div class="onboarding-step" data-step="4">
        <div class="step-emoji">🎯</div>
        <div class="step-title">實際收入模式</div>
        <div class="step-subtitle">扣除每月固定支出，了解更接近真實可支配收入的換算結果。</div>
        <div class="step-content">
          <div class="toggle-row">
            <div>
              <div class="toggle-label">啟用實際收入換算</div>
              <div style="font-size:13px;color:var(--color-fg-2);margin-top:2px">從收入換算中扣除固定支出</div>
            </div>
            <button class="toggle" id="onboarding-real-wage-toggle" type="button" onclick="toggleRealWage(this)"></button>
          </div>

            <div class="input-group">
              <label class="input-label" for="onboarding-expenses">每月固定支出（$）</label>
              <input class="input-field" type="text" inputmode="decimal" pattern="[0-9]*[.]?[0-9]*" data-number-mode="decimal" id="onboarding-expenses" placeholder="例如 2000" min="0" step="0.01" autocomplete="off">
            </div>
          </div>
        </div>
      </div>

      <!-- Step 5: All Set -->
      <div class="onboarding-step" data-step="5">
        <div class="step-emoji">🎉</div>
        <div class="step-title">設定完成！</div>
        <div class="step-subtitle">你每工作一分鐘，大約值：</div>

          </p>
        </div>
      </div>

function t(zh) {
  if (IS_CHINESE_DEVICE) return zh;
  return UI_EN[zh] || zh;

function pluralEn(value, one, many) {
  return `${value} ${value === 1 ? one : many}`;
}

function translateDynamicText(core) {
  if (UI_EN[core]) return UI_EN[core];
  let m;
  if (core === '這會永久移除這個觀望項目。此操作無法復原。') return 'This will permanently remove this watchlist item. This action cannot be undone.';
  if (core === '這會永久刪除此筆紀錄與備註。此操作無法復原。') return 'This will permanently delete this entry and its notes. This action cannot be undone.';
  if ((m = core.match(/^(.+)% 買下$/))) return `${m[1]}% bought`;
  if ((m = core.match(/^(.+)% 放棄$/))) return `${m[1]}% skipped`;
  if ((m = core.match(/^目前換算：\$(.+)\/分鐘$/))) return `Current rate: $${m[1]}/min`;
  if ((m = core.match(/^調整後換算：\$(.+)\/分鐘$/))) return `Adjusted rate: $${m[1]}/min`;
  if ((m = core.match(/^\$(.+) \/ 分鐘$/))) return `$${m[1]} / min`;
  if ((m = core.match(/^(\d+) 秒$/))) return pluralEn(Number(m[1]), 'sec', 'sec');
  if ((m = core.match(/^(\d+) 分鐘$/))) return pluralEn(Number(m[1]), 'min', 'min');
  if ((m = core.match(/^(\d+) 小時$/))) return pluralEn(Number(m[1]), 'hr', 'hr');
  if ((m = core.match(/^(\d+) 小時 (\d+) 分鐘$/))) return `${pluralEn(Number(m[1]), 'hr', 'hr')} ${pluralEn(Number(m[2]), 'min', 'min')}`;
  if ((m = core.match(/^(\d+) 分鐘前$/))) return `${pluralEn(Number(m[1]), 'min', 'min')} ago`;
  if ((m = core.match(/^(\d+) 小時前$/))) return `${pluralEn(Number(m[1]), 'hr', 'hr')} ago`;
  if ((m = core.match(/^(\d+) 天前$/))) return `${pluralEn(Number(m[1]), 'day', 'days')} ago`;
  return core;
}

function translateTextPreserveWhitespace(text) {
  if (IS_CHINESE_DEVICE || !text || !/[\u4e00-\u9fff]/.test(text)) return text;
  const leading = text.match(/^\s*/)[0];
  const trailing = text.match(/\s*$/)[0];
  const core = text.trim();
  if (!core) return text;
  const translated = translateDynamicText(core);
  return leading + translated + trailing;
}

function localizeElementAttributes(el) {
  if (IS_CHINESE_DEVICE || !el || !el.getAttribute) return;
  ['placeholder', 'aria-label', 'title', 'alt'].forEach(attr => {
    const value = el.getAttribute(attr);
    if (value && /[\u4e00-\u9fff]/.test(value)) {
      el.setAttribute(attr, translateTextPreserveWhitespace(value));
    }
  });
}

function localizeNode(root = document.body) {
  if (IS_CHINESE_DEVICE || !root) return;
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
    acceptNode(node) {
      const parent = node.parentElement;
      if (!parent || ['SCRIPT', 'STYLE'].includes(parent.tagName)) return NodeFilter.FILTER_REJECT;
      return /[\u4e00-\u9fff]/.test(node.nodeValue) ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_SKIP;
    }
  });
  const textNodes = [];
  while (walker.nextNode()) textNodes.push(walker.currentNode);
  textNodes.forEach(node => { node.nodeValue = translateTextPreserveWhitespace(node.nodeValue); });
  if (root.nodeType === 1) localizeElementAttributes(root);
  root.querySelectorAll?.('*').forEach(localizeElementAttributes);
}

let localizeScheduled = false;
function scheduleLocalize(root = document.body) {
  if (IS_CHINESE_DEVICE || localizeScheduled) return;
  localizeScheduled = true;
  requestAnimationFrame(() => {
    localizeScheduled = false;
    localizeNode(root);
  });
}

function startLanguageObserver() {
  if (IS_CHINESE_DEVICE) return;
  localizeNode(document.body);
  const observer = new MutationObserver(() => scheduleLocalize(document.body));
  observer.observe(document.body, { childList: true, subtree: true, characterData: true, attributes: true, attributeFilter: ['placeholder', 'aria-label', 'title', 'alt'] });
}

/* ============================================================

function escapeHtml(str) {
  const d = document.createElement('div');
  d.appendChild(document.createTextNode(String(str ?? '')));
  return d.innerHTML;
}

/* ============================================================
   CRYPTO — SHA-256 via SubtleCrypto
   ============================================================ */
async function hashPassword(password) {
  const buf  = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(password));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

function getUsers() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { return {}; }
}
function saveUsers(u) { localStorage.setItem(STORAGE_KEY, JSON.stringify(u)); }

function createLocalUserData(seed = {}) {
  return {
    settings:   { ...defaultSettings(), ...(seed.settings || {}) },
    entries:    Array.isArray(seed.entries) ? seed.entries.map(entry => ({ ...entry, category: localizeLegacyCategory(entry.category) })) : [],
    categories: Array.isArray(seed.categories) ? seed.categories.map(localizeLegacyCategory) : [...DEFAULT_CATEGORIES]
  };
}

function ensureLocalUserData() {
  const users = getUsers();
  if (users[LOCAL_USER_ID]) {
    currentUser = LOCAL_USER_ID;
    users[LOCAL_USER_ID] = createLocalUserData(users[LOCAL_USER_ID]);
    saveUsers(users);
    return users[LOCAL_USER_ID];
  }

  // Migrate the previously signed-in profile, or the first legacy profile, into
  // the new auth-free local profile. This keeps existing localStorage data.
  const savedLegacyUser = sessionStorage.getItem(SESSION_KEY);
  const legacyKey = (savedLegacyUser && users[savedLegacyUser])
    ? savedLegacyUser
    : Object.keys(users).find(key => users[key] && typeof users[key] === 'object');

  users[LOCAL_USER_ID] = createLocalUserData(legacyKey ? users[legacyKey] : {});
  currentUser = LOCAL_USER_ID;
  saveUsers(users);
  return users[LOCAL_USER_ID];
}

function getCurrentUserData() { return getUsers()[currentUser] || ensureLocalUserData(); }
function saveCurrentUserData(data) {
  const u = getUsers();
  u[currentUser] = createLocalUserData(data);
  saveUsers(u);
}

function getUserSettings()   { return getCurrentUserData()?.settings   || defaultSettings(); }
function getUserEntries()    { return getCurrentUserData()?.entries    || []; }
function getUserCategories() { return getCurrentUserData()?.categories || [...DEFAULT_CATEGORIES]; }

function generateId() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

/* ============================================================
   EARNING RATE MATH
   ============================================================ */
function calcEarningPerMinute(s) {
  const { incomeType, incomeAmount, hoursPerWeek, realWageEnabled, monthlyFixedExpenses } = s;
  let perMin = 0;
  // 4.333... = average weeks per month (52 weeks / 12 months ≈ 4.33). This
  // standard payroll approximation matches the spec and common industry usage.
  const WEEKS_PER_MONTH = 52 / 12;
  if (incomeType === 'hourly')   perMin = incomeAmount / 60;
  if (incomeType === 'monthly')  perMin = incomeAmount / (hoursPerWeek * WEEKS_PER_MONTH) / 60;
  if (incomeType === 'annual')   perMin = incomeAmount / (hoursPerWeek * 52)               / 60;
  if (realWageEnabled && monthlyFixedExpenses > 0) {
    perMin = Math.max(0, perMin - monthlyFixedExpenses / (hoursPerWeek * WEEKS_PER_MONTH) / 60);
  }
  return perMin;
}

function formatMinutes(minutes) {
  if (minutes <= 0) return IS_CHINESE_DEVICE ? '0 分鐘' : '0 min';
  if (minutes < 1) {
    const sec = Math.round(minutes * 60);
    return IS_CHINESE_DEVICE ? `${sec} 秒` : pluralEn(sec, 'sec', 'sec');
  }
  if (minutes < 60) {
    const m = Math.round(minutes);
    return IS_CHINESE_DEVICE ? `${m} 分鐘` : pluralEn(m, 'min', 'min');
  }
  const h = Math.floor(minutes / 60);
  const m = Math.round(minutes % 60);
  if (IS_CHINESE_DEVICE) {
    const hStr = `${h} 小時`;
    return m === 0 ? hStr : `${hStr} ${m} 分鐘`;
  }
  const hStr = pluralEn(h, 'hr', 'hr');
  return m === 0 ? hStr : `${hStr} ${pluralEn(m, 'min', 'min')}`;
}

function formatCurrency(n) {
  return '$' + parseFloat(n).toFixed(2);
}

function normalizeDecision(decision) {
  if (decision === 'skip') return 'skip';
  if (decision === 'watch_list') return 'watchlist';
  return decision;
}

function getHistoryEntries() {
  return getUserEntries().filter(e => normalizeDecision(e.decision) !== 'watchlist');
}

function getWatchlistEntries() {
  return getUserEntries().filter(e => normalizeDecision(e.decision) === 'watchlist');
}

function getEntryRate(entry) {
  if (entry && entry.amount > 0 && entry.minutes > 0) return entry.amount / entry.minutes;
  return calcEarningPerMinute(getUserSettings());
}

function showScreen(name) {
  const target = document.getElementById('screen-' + name);
  if (!target) return;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  target.classList.add('active');
  scheduleLocalize(target);
}

function postLogin() {
  ensureLocalUserData();
  const settings = getUserSettings();
  if (!settings.onboardingComplete) {
    showScreen('onboarding');
    startOnboarding();
  } else {
    showScreen('app');
    renderApp();
  }
}

function restartOnboarding() {
  showScreen('onboarding');
  startOnboarding();
}

function handleLogout() {
  // There is no account/session anymore; keep this for older buttons, but route
  // to onboarding so users can reconfigure the local profile.
  restartOnboarding();
}

function setError(el, msg) {
  if (!el) return;
  el.textContent = msg;
  el.classList.toggle('visible', !!msg);
}

   ============================================================ */
function startOnboarding() {
  onboardingStep = 1;
  onboardingData = { incomeType: 'hourly', incomeAmount: 0, hoursPerWeek: 40, realWageEnabled: false, monthlyFixedExpenses: 0 };
  // Reset radio selection UI
  document.querySelectorAll('#income-type-group .radio-option').forEach(opt => {
    const isHourly = opt.dataset.value === 'hourly';
    opt.classList.toggle('selected', isHourly);
    opt.querySelector('input').checked = isHourly;
  });
  document.getElementById('onboarding-income-amount').value = '';
  document.getElementById('onboarding-hours').value         = '40';
  document.getElementById('onboarding-real-wage-toggle').classList.remove('on');
  document.getElementById('real-wage-input').style.display  = 'none';
  document.getElementById('onboarding-expenses').value      = '';
  renderOnboardingStep(1);
}

function renderOnboardingStep(step) {
  document.querySelectorAll('.onboarding-step').forEach(el =>
    el.classList.toggle('active', parseInt(el.dataset.step) === step)
  );
  document.querySelectorAll('.progress-dot').forEach(dot => {
    const n = parseInt(dot.dataset.dot);
    dot.classList.toggle('active', n === step);
    dot.classList.toggle('done', n < step);
  });
  document.getElementById('onboarding-next-btn').textContent = step === 5 ? t('開始使用') : t('繼續');
  const backBtn = document.getElementById('onboarding-back-btn');
  const canReturnToApp = !!getUserSettings().onboardingComplete;
  backBtn.style.display = (step === 1 && !canReturnToApp) ? 'none' : 'flex';
  backBtn.textContent = step === 1 ? t('回到主畫面') : t('返回');
  if (step === 2) updateIncomeAmountLabel();
  if (step === 5) renderOnboardingRate();
}

function updateIncomeAmountLabel() {
  const map = { hourly: t('時薪（$）'), monthly: t('月薪（$）'), annual: t('年薪（$）') };
  document.getElementById('income-amount-label').textContent = map[onboardingData.incomeType] || t('金額（$）');
}

function renderOnboardingRate() {
  const rate = calcEarningPerMinute(onboardingData);
  document.getElementById('onboarding-rate-display').textContent = '$' + rate.toFixed(4);
}

function onboardingNext() {
  if (!collectOnboardingStep(onboardingStep)) return;
  if (onboardingStep < 5) {
    onboardingStep++;
    renderOnboardingStep(onboardingStep);
  } else {
    completeOnboarding();
  }
}

function onboardingBack() {
  if (onboardingStep === 1) {
    if (getUserSettings().onboardingComplete) {
      showScreen('app');
      renderApp();
    }
    return;
  }
  if (onboardingStep > 1) { onboardingStep--; renderOnboardingStep(onboardingStep); }
}

function collectOnboardingStep(step) {
  if (step === 2) {
    const amt = parseFloat(document.getElementById('onboarding-income-amount').value);
    if (!amt || amt <= 0) { alert(t('請輸入有效的收入金額。')); return false; }
    onboardingData.incomeAmount = amt;
  }
  if (step === 3) {
    const hrs = parseFloat(document.getElementById('onboarding-hours').value);
    if (!hrs || hrs <= 0 || hrs > 168) { alert(t('請輸入有效的工時（1–168）。')); return false; }
    onboardingData.hoursPerWeek = hrs;
  }
  if (step === 4) {
    const toggle = document.getElementById('onboarding-real-wage-toggle');
    onboardingData.realWageEnabled = toggle.classList.contains('on');
    if (onboardingData.realWageEnabled) {
      onboardingData.monthlyFixedExpenses = parseFloat(document.getElementById('onboarding-expenses').value) || 0;
    }
  }
  return true;
}

function toggleRealWage(btn) {
  btn.classList.toggle('on');
  document.getElementById('real-wage-input').style.display = btn.classList.contains('on') ? 'block' : 'none';
}

function completeOnboarding() {
  const data = getCurrentUserData();
  data.settings = {
    incomeType:           onboardingData.incomeType,
    incomeAmount:         onboardingData.incomeAmount,
    hoursPerWeek:         onboardingData.hoursPerWeek,
    realWageEnabled:      onboardingData.realWageEnabled,
    monthlyFixedExpenses: onboardingData.monthlyFixedExpenses,
    onboardingComplete:   true
  };
  saveCurrentUserData(data);
  showScreen('app');
  renderApp();
}

/* ============================================================
   CALCULATOR
   ============================================================ */
function updateBillDisplay(input, rate) {
  const amount = parseFloat(input) || 0;
  const amountEl = document.getElementById('bill-amount');
  const minsEl = document.getElementById('bill-minutes');
  const captionEl = document.getElementById('bill-caption');
  const timeLabelEl = document.getElementById('bill-time-label');
  const dividerEl = document.getElementById('bill-divider');

  if (!input || input === '0') {
    amountEl.textContent = '$0';
    minsEl.textContent = '';
    if (captionEl) captionEl.textContent = '';
    if (timeLabelEl) timeLabelEl.style.display = 'none';
    if (dividerEl) dividerEl.style.display = 'none';
    return;
  }

  const parts = input.split('.');
  const intStr = parseInt(parts[0] || '0', 10).toLocaleString();
  const display = parts.length > 1 ? `$${intStr}.${parts[1]}` : `$${intStr}`;
  amountEl.textContent = display;

  if (timeLabelEl) timeLabelEl.style.display = 'block';
  if (dividerEl) dividerEl.style.display = 'block';

  if (rate > 0 && amount > 0) {
    minsEl.textContent = formatMinutes(amount / rate);
    if (captionEl) captionEl.textContent = '';
  } else {
    minsEl.textContent = '—';
    if (captionEl) captionEl.textContent = t('請先到「設定」輸入收入，才能換算工作時間。');
  }
}

function keyPress(key) {
  if (key === 'backspace') {
    calcInput = calcInput.length > 1 ? calcInput.slice(0, -1) : '0';
  } else if (key === '00') {
    if (calcInput !== '0' && calcInput.replace(/^0/, '').length <= 7) calcInput += '00';
  } else {
    if (calcInput.replace(/^0/, '').length >= 8) return;
    calcInput = (calcInput === '0') ? key : calcInput + key;
  }

  const rate = calcEarningPerMinute(getUserSettings());
  updateBillDisplay(calcInput, rate);
}

function handleEnter() {
  const amount = parseFloat(calcInput) || 0;
  if (amount <= 0) return;

  currentAmount = amount;
  const rate = calcEarningPerMinute(getUserSettings());
  const minutes = rate > 0 ? amount / rate : 0;

  document.getElementById('sheet-amount-text').textContent = formatCurrency(amount);
  document.getElementById('sheet-time-text').textContent = rate > 0 ? formatMinutes(minutes) : '—';

  // Reset to action buttons view
  document.getElementById('sheet-actions-wrap').style.display = 'block';
  document.getElementById('sheet-form').classList.remove('visible');
  currentDecision = null;
  openSheet();
}

function openSheet() {
  document.getElementById('sheet-overlay').classList.add('visible');
  document.getElementById('result-sheet').classList.add('open');
  scheduleLocalize(document.getElementById('result-sheet'));
}

function closeSheet() {
  document.getElementById('sheet-overlay').classList.remove('visible');
  document.getElementById('result-sheet').classList.remove('open');
  document.getElementById('sheet-form').classList.remove('visible');
  document.getElementById('sheet-actions-wrap').style.display = 'block';
  currentDecision = null;
}

function selectAction(decision) {
  if (decision === 'no_track') { closeSheet(); resetCalc(); return; }

  currentDecision = normalizeDecision(decision);
  document.getElementById('sheet-actions-wrap').style.display = 'none';

  // Render category pills
  const categories = getUserCategories();
  document.getElementById('sheet-categories').innerHTML =
    categories.map(cat =>
      `<button class="category-pill" type="button" role="option" onclick="selectCategory(this)">${escapeHtml(cat)}</button>`
    ).join('');

  document.getElementById('entry-name-input').value = '';
  document.getElementById('sheet-form').classList.add('visible');
  setTimeout(() => document.getElementById('entry-name-input').focus(), 30);
}

function selectCategory(btn) {
  document.querySelectorAll('#sheet-categories .category-pill').forEach(p => p.classList.remove('selected'));
  btn.classList.add('selected');
}

function saveEntry() {
  const name     = document.getElementById('entry-name-input').value.trim() || t('未命名');
  const selCat   = document.querySelector('#sheet-categories .category-pill.selected');
  const category = selCat ? selCat.textContent : '❓ 其他';

  const settings = getUserSettings();
  const rate     = calcEarningPerMinute(settings);
  const entry    = {
    id:        generateId(),
    amount:    currentAmount,
    minutes:   rate > 0 ? currentAmount / rate : 0,
    decision:  normalizeDecision(currentDecision),
    notes:     '',
    name,
    category,
    timestamp: new Date().toISOString()
  };

  const data = getCurrentUserData();
  data.entries = data.entries || [];
  data.entries.unshift(entry);
  saveCurrentUserData(data);

  closeSheet();
  showSuccess();
  resetCalc();
  renderHistory();
  renderWatchlist();
}

function cancelEntry() { closeSheet(); }

function resetCalc() {
  calcInput = '0';
  updateBillDisplay('0', calcEarningPerMinute(getUserSettings()));
}

function showSuccess() {
  const overlay = document.getElementById('success-overlay');
  overlay.classList.add('visible');
  // Re-trigger SVG animation
  const path = overlay.querySelector('.checkmark-path');
  path.style.animation = 'none';
  void path.offsetWidth; // Force reflow to reset SVG animation before replaying
  path.style.animation = '';
  setTimeout(() => overlay.classList.remove('visible'), 650);
}

/* Keyboard support for calculator */
document.addEventListener('keydown', e => {
  if (!document.getElementById('tab-calculator').classList.contains('active')) return;
  if (document.getElementById('result-sheet').classList.contains('open')) return;
  if (document.activeElement && document.activeElement.tagName === 'INPUT') return;
  if (e.key >= '0' && e.key <= '9') { e.preventDefault(); keyPress(e.key); }
    else if (e.key === 'Backspace')    { e.preventDefault(); keyPress('backspace'); }
  else if (e.key === 'Enter')        { e.preventDefault(); handleEnter(); }
});

/* ============================================================
   HISTORY
   ============================================================ */
function setHistoryPeriod(period) {
  historyPeriod = period;
  document.querySelectorAll('.seg-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.period === period)
  );
  renderHistory();
}

function getFilteredEntries(period) {
  const now     = new Date();
  const entries = getHistoryEntries();
  return entries.filter(e => {
    const d = new Date(e.timestamp);
    if (period === 'daily')   return d.toDateString() === now.toDateString();
    if (period === 'weekly') {
      const ws = new Date(now); ws.setDate(now.getDate() - now.getDay()); ws.setHours(0,0,0,0);
      return d >= ws;
    }
    if (period === 'monthly') return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    if (period === 'yearly')  return d.getFullYear() === now.getFullYear();
    return true;
  });
}

function renderHistory() {
  const body = document.getElementById('history-body');
  const entries = getFilteredEntries(historyPeriod);

  if (entries.length === 0) {
    body.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">📭</div>
        <div class="empty-state-title">目前沒有紀錄</div>
        <div class="empty-state-text">你買下或放棄的項目會顯示在這裡。</div>
      </div>`;
    return;
  }

  const bought = entries.filter(e => normalizeDecision(e.decision) === 'buy');
  const skipped = entries.filter(e => normalizeDecision(e.decision) === 'skip');
  const totalAmt = entries.reduce((s, e) => s + e.amount, 0);
  const boughtAmt = bought.reduce((s, e) => s + e.amount, 0);
  const skippedAmt = skipped.reduce((s, e) => s + e.amount, 0);
  const boughtMin = bought.reduce((s, e) => s + e.minutes, 0);
  const skippedMin = skipped.reduce((s, e) => s + e.minutes, 0);
  const buyPct = entries.length ? Math.round(bought.length / entries.length * 100) : 0;
  const skipPct = 100 - buyPct;

  let html = `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">紀錄總數</div>
        <div class="stat-value">${entries.length}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">總金額</div>
        <div class="stat-value">${formatCurrency(totalAmt)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">已買下</div>
        <div class="stat-value" style="color:var(--color-success)">${formatMinutes(boughtMin)}</div>
        <div class="stat-sub">${formatCurrency(boughtAmt)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">已放棄</div>
        <div class="stat-value" style="color:var(--color-error)">${formatMinutes(skippedMin)}</div>
        <div class="stat-sub">${formatCurrency(skippedAmt)}</div>
      </div>
      <div class="ratio-card">
        <div class="stat-label">買下與放棄比例</div>
        <div class="ratio-bar">
          <div class="ratio-bar-buy" style="width:${buyPct}%"></div>
          <div class="ratio-bar-give" style="width:${skipPct}%"></div>
        </div>
        <div class="ratio-labels">
          <span class="ratio-buy-label">${buyPct}% 買下</span>
          <span class="ratio-give-label">${skipPct}% 放棄</span>
        </div>
      </div>
    </div>`;

  const groups = {};
  entries.forEach(e => {
    const label = new Date(e.timestamp).toLocaleDateString(APP_LOCALE, { weekday: 'long', month: 'short', day: 'numeric' });
    (groups[label] = groups[label] || []).push(e);
  });

  for (const [dateLabel, group] of Object.entries(groups)) {
    html += `<div class="date-group"><div class="date-group-label">${escapeHtml(dateLabel)}</div>`;
    group.forEach(e => {
      const em = (e.category || '❓').split(' ')[0];
      const decision = normalizeDecision(e.decision);
      html += `
        <div class="entry-card interactive" role="button" tabindex="0" onclick="openEntryModal('${e.id}')" onkeydown="handleEntryCardKey(event, '${e.id}')">
          <div class="entry-emoji">${escapeHtml(em)}</div>
          <div class="entry-info">
            <div class="entry-name">${escapeHtml(e.name)}</div>
            <div class="entry-time">${relativeTime(e.timestamp)}</div>
          </div>
          <div class="entry-right">
            <div class="entry-amount">${formatCurrency(e.amount)}</div>
            <div class="entry-work">${formatMinutes(e.minutes)}</div>
            <div class="entry-badge ${decision === 'buy' ? 'buy' : 'skip'}">
              ${decision === 'buy' ? '已買下' : '已放棄'}
            </div>
          </div>
        </div>`;
    });
    html += '</div>';
  }

  body.innerHTML = html;
}

function renderWatchlist() {
  const body = document.getElementById('watchlist-body');
  const entries = getWatchlistEntries();

  if (entries.length === 0) {
    body.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">👀</div>
        <div class="empty-state-title">觀望清單目前是空的</div>
        <div class="empty-state-text">在計算機裡把想再想想的項目放到這裡。</div>
      </div>`;
    return;
  }

  let html = '<div class="date-group">';
  entries.forEach(e => {
    const em = (e.category || '❓').split(' ')[0];
    html += `
      <div class="entry-card watchlist-card interactive" role="button" tabindex="0" onclick="openEntryModal('${e.id}')" onkeydown="handleEntryCardKey(event, '${e.id}')">
        <div class="entry-emoji">${escapeHtml(em)}</div>
        <div class="entry-info">
          <div class="entry-name">${escapeHtml(e.name)}</div>
          <div class="entry-time">${relativeTime(e.timestamp)}</div>
        </div>
        <div class="entry-right">
          <div class="entry-amount">${formatCurrency(e.amount)}</div>
          <div class="entry-work">${formatMinutes(e.minutes)}</div>
          <div class="entry-badge watchlist">觀望中</div>
        </div>
      </div>`;

function handleEntryCardKey(event, entryId) {
  if (event.key === 'Enter' || event.key === ' ') {
    event.preventDefault();
    openEntryModal(entryId);
  }
}

function relativeTime(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff / 60000);
  if (IS_CHINESE_DEVICE) {
    if (mins < 1)   return '剛剛';
    if (mins < 60)  return `${mins} 分鐘前`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24)   return `${hrs} 小時前`;
    const days = Math.floor(hrs / 24);
    if (days === 1) return '昨天';
    if (days < 7)   return `${days} 天前`;
    return new Date(iso).toLocaleDateString(APP_LOCALE, { month: 'short', day: 'numeric' });
  }
  if (mins < 1)   return 'Just now';
  if (mins < 60)  return `${pluralEn(mins, 'min', 'min')} ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24)   return `${pluralEn(hrs, 'hr', 'hr')} ago`;
  const days = Math.floor(hrs / 24);
  if (days === 1) return 'Yesterday';
  if (days < 7)   return `${pluralEn(days, 'day', 'days')} ago`;
  return new Date(iso).toLocaleDateString(APP_LOCALE, { month: 'short', day: 'numeric' });
}

function updateSetting(field, value) {
  const data = getCurrentUserData();
  data.settings[field] = value;

  refreshRateDisplays();
}

function toggleSettingsRealWage(btn) {
  btn.classList.toggle('on');

  updateSetting('realWageEnabled', on);
  const expRow  = document.getElementById('st-expenses-row');
  const adjRate = document.getElementById('st-adj-rate');
  if (expRow)  expRow.style.display  = on ? 'flex'  : 'none';
  if (adjRate) adjRate.style.display = on ? 'block' : 'none';
}

function refreshRateDisplays() {
  const rate = calcEarningPerMinute(getUserSettings());
  const mainRate = document.getElementById('st-rate');
  const adjRate = document.getElementById('st-adj-rate');
  if (mainRate) mainRate.textContent = IS_CHINESE_DEVICE ? `目前換算：$${rate.toFixed(4)}/分鐘` : `Current rate: $${rate.toFixed(4)}/min`;
  if (adjRate) adjRate.textContent = IS_CHINESE_DEVICE ? `調整後換算：$${rate.toFixed(4)}/分鐘` : `Adjusted rate: $${rate.toFixed(4)}/min`;
  updateRateChip(rate);
  updateBillDisplay(calcInput, rate);
  renderHistory();
  renderWatchlist();
}

function moveCategory(idx, direction) {
  const data = getCurrentUserData();
  const cats = [...(data.categories || [...DEFAULT_CATEGORIES])];
  const next = idx + direction;
  if (next < 0 || next >= cats.length) return;
  [cats[idx], cats[next]] = [cats[next], cats[idx]];
  data.categories = cats;
  saveCurrentUserData(data);
  renderSettings();
}

function deleteCategory(idx) {
  const data = getCurrentUserData();
  const cats = [...(data.categories || [...DEFAULT_CATEGORIES])];
  cats.splice(idx, 1);
  data.categories = cats;
  saveCurrentUserData(data);
  renderSettings();
}

/* ============================================================
   NUMERIC INPUT GUARDRAILS — mobile keypad + no e/+/− text
   ============================================================ */
function normalizeNumericValue(value, mode = 'decimal') {
  let raw = String(value || '').replace(/，/g, '.').replace(/,/g, '.');
  if (mode === 'integer') return raw.replace(/\D+/g, '');
  raw = raw.replace(/[^0-9.]/g, '');
  const firstDot = raw.indexOf('.');
  if (firstDot === -1) return raw;
  return raw.slice(0, firstDot + 1) + raw.slice(firstDot + 1).replace(/\./g, '');
}

function sanitizeNumericInput(input) {
  if (!input || !input.dataset || !input.dataset.numberMode) return;
  const mode = input.dataset.numberMode;
  const clean = normalizeNumericValue(input.value, mode);
  if (input.value !== clean) {
    const cursor = Math.min(clean.length, input.selectionStart || clean.length);
    input.value = clean;
    try { input.setSelectionRange(cursor, cursor); } catch (_) {}
  }
}

function setupNumericInputs(root = document) {
  root.querySelectorAll?.('input[data-number-mode]').forEach(input => {
    input.setAttribute('inputmode', input.dataset.numberMode === 'integer' ? 'numeric' : 'decimal');
    input.setAttribute('autocomplete', 'off');
    input.setAttribute('autocorrect', 'off');
    input.setAttribute('spellcheck', 'false');
    sanitizeNumericInput(input);
  });
}

document.addEventListener('beforeinput', e => {
  const input = e.target;
  if (!(input instanceof HTMLInputElement) || !input.dataset.numberMode || !e.data) return;
  const mode = input.dataset.numberMode;
  if (mode === 'integer' && /\D/.test(e.data)) e.preventDefault();
  if (mode !== 'integer' && /[^0-9.,]/.test(e.data)) e.preventDefault();
  if (mode !== 'integer' && /[.,]/.test(e.data) && input.value.includes('.')) e.preventDefault();
});

document.addEventListener('input', e => {
  if (e.target instanceof HTMLInputElement && e.target.dataset.numberMode) sanitizeNumericInput(e.target);
});

document.addEventListener('paste', e => {
  const input = e.target;
  if (!(input instanceof HTMLInputElement) || !input.dataset.numberMode) return;
  e.preventDefault();
  const text = (e.clipboardData || window.clipboardData).getData('text');
  const clean = normalizeNumericValue(text, input.dataset.numberMode);
  document.execCommand('insertText', false, clean);
});

const DATE_TIME_OPTIONS = { year: 'numeric', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' };
function formatEntryTimestamp(iso) {
  const date = new Date(iso);
  if (Number.isNaN(date.getTime())) return '';
  return date.toLocaleString(APP_LOCALE, DATE_TIME_OPTIONS);
}
function decisionDisplayLabel(decision) {
  const normalized = normalizeDecision(decision);
  if (normalized === 'buy') return t('已買下');
  if (normalized === 'skip') return t('已放棄');
  return t('觀望中');
}
function decisionClass(decision) {
  const normalized = normalizeDecision(decision);
  return normalized === 'buy' ? 'buy' : normalized === 'skip' ? 'skip' : 'watchlist';
}
function billMoneyDisplay(input) {
  if (!input || input === '0') return '$ 0';
  const parts = String(input).split('.');
  const intStr = parseInt(parts[0] || '0', 10).toLocaleString();
  return parts.length > 1 ? `$ ${intStr}.${parts[1]}` : `$ ${intStr}`;
}

function updateBillDisplay(input, rate) {
  const amount = parseFloat(input) || 0;
  const amountEl = document.getElementById('bill-amount');
  const minsEl = document.getElementById('bill-minutes');
  const captionEl = document.getElementById('bill-caption');
  const timeLabelEl = document.getElementById('bill-time-label');
  const dividerEl = document.getElementById('bill-divider');

  amountEl.textContent = billMoneyDisplay(input);
  if (timeLabelEl) timeLabelEl.style.display = 'none';
  if (dividerEl) dividerEl.style.display = 'none';

  if (!input || input === '0' || amount <= 0) {
    minsEl.textContent = t('所需時間');
    minsEl.classList.add('is-placeholder');

function billMoneyDisplay(input) {
  if (!input || input === '0') return '$0';
  const parts = String(input).split('.');
  const intStr = parseInt(parts[0] || '0', 10).toLocaleString();
  return parts.length > 1 ? `$${intStr}.${parts[1]}` : `$${intStr}`;
}

function updateBillDisplay(input, rate) {
  const amount = parseFloat(input) || 0;
  const amountEl = document.getElementById('bill-amount');
  const minsEl = document.getElementById('bill-minutes');
  const captionEl = document.getElementById('bill-caption');
  const timeLabelEl = document.getElementById('bill-time-label');
  const dividerEl = document.getElementById('bill-divider');

  amountEl.textContent = billMoneyDisplay(input);
  if (timeLabelEl) timeLabelEl.style.display = 'none';
  if (dividerEl) dividerEl.style.display = 'none';

  if (!input || input === '0' || amount <= 0) {
    minsEl.textContent = t('所需時間');
    minsEl.classList.add('is-placeholder');
    if (captionEl) captionEl.textContent = '';
    return;
  }

  minsEl.classList.remove('is-placeholder');
  if (rate > 0) {
    minsEl.textContent = formatMinutes(amount / rate);
    if (captionEl) captionEl.textContent = '';
  } else {
    minsEl.textContent = '—';
    if (captionEl) captionEl.textContent = t('請先到「設定」輸入收入，才能換算工作時間。');
  }
}

function migrateBenjaminData() {
  const data = getCurrentUserData();
  data.settings = { ...defaultSettings(), ...(data.settings || {}), onboardingComplete: true };
  data.entries = (data.entries || []).map(entry => {
    const decision = normalizeDecision(entry.decision);
    if (!decision || decision === 'buy') return { ...entry, decision: 'expense' };
    return entry;
  });
  saveCurrentUserData(data);
}

    .map(entry => ({ ...entry, amount: Number(entry.amount || 0) }))
    .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

  const wrap = document.getElementById('sheet-categories');
  if (!wrap) return;
  wrap.innerHTML = categories.map((cat, index) =>
    `<button class="category-pill ${index === 0 ? 'selected' : ''}" type="button" role="option" data-category="${escapeHtml(cat)}" onclick="selectCategory(this)">${escapeHtml(t(cat))}</button>`
  ).join('');
}

function ensureSheetNotesField() {
  const form = document.getElementById('sheet-form');
  if (!form || document.getElementById('entry-notes-input')) return;
  const saveRow = form.querySelector('.sheet-save-row');
  saveRow?.insertAdjacentHTML('beforebegin', `
    <div class="input-group">
      <label class="input-label" for="entry-notes-input">${t('備註（可選）')}</label>
      <textarea class="modal-textarea benjamin-sheet-notes" id="entry-notes-input" placeholder="${t('新增備註')}" maxlength="240"></textarea>
    </div>`);
}

function handleEnter() {
  const amount = parseFloat(calcInput) || 0;
  if (amount <= 0) return;

  currentAmount = amount;
  currentDecision = 'expense';

  const sheetTime = document.getElementById('sheet-time-text');
  const sheetAmount = document.getElementById('sheet-amount-text');
  if (sheetTime) sheetTime.textContent = formatCurrency(amount);
  if (sheetAmount) sheetAmount.textContent = formatCurrency(amount);

  const actionsWrap = document.getElementById('sheet-actions-wrap');
  if (actionsWrap) actionsWrap.style.display = 'none';
  ensureSheetNotesField();
  renderSheetCategories();

  const nameInput = document.getElementById('entry-name-input');
  const notesInput = document.getElementById('entry-notes-input');
  if (nameInput) nameInput.value = '';
  if (notesInput) notesInput.value = '';
  document.getElementById('sheet-form')?.classList.add('visible');
  openSheet();
  window.setTimeout(() => nameInput?.focus(), 60);
}

function closeSheet() {
  document.getElementById('sheet-overlay')?.classList.remove('visible');
  document.getElementById('result-sheet')?.classList.remove('open');
  document.getElementById('sheet-form')?.classList.remove('visible');
  const actionsWrap = document.getElementById('sheet-actions-wrap');
  if (actionsWrap) actionsWrap.style.display = 'none';
  currentDecision = null;
}

function saveEntry() {
  const nameInput = document.getElementById('entry-name-input');
  const notesInput = document.getElementById('entry-notes-input');
  const selCat = document.querySelector('#sheet-categories .category-pill.selected');
  const category = selCat?.dataset.category || getUserCategories()[0] || '❓ 其他';
  const entry = {
    id: generateId(),
    amount: currentAmount,
    decision: 'expense',
    notes: notesInput ? notesInput.value.trim() : '',
    name: nameInput?.value.trim() || t('未命名支出'),
    category,
    timestamp: new Date().toISOString()
  };

  const data = getCurrentUserData();
  data.entries = data.entries || [];
  data.entries.unshift(entry);
  saveCurrentUserData(data);

  closeSheet();
  showSuccess();
  resetCalc();
  renderHistory();
  renderAnalytics();
}

function cancelEntry() { closeSheet(); }

function switchTab(tab) {
  const target = tab === 'watchlist' ? 'analytics' : tab;
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + target)?.classList.add('active');
  document.querySelector(`.tab-btn[data-tab="${target}"]`)?.classList.add('active');
  if (target === 'history') renderHistory();
  if (target === 'analytics') renderAnalytics();
  if (target === 'settings') renderSettings();
}

function getPeriodRange(period, offset = 0) {
  const now = new Date();
  let start = new Date(now);
  let end = new Date(now);
  if (period === 'daily') {
    start.setHours(0, 0, 0, 0);
    start.setDate(start.getDate() + offset);
    end = new Date(start); end.setDate(start.getDate() + 1);
  } else if (period === 'weekly') {
    start.setDate(now.getDate() - now.getDay() + offset * 7);
    start.setHours(0, 0, 0, 0);
    end = new Date(start); end.setDate(start.getDate() + 7);
  } else if (period === 'monthly') {
    start = new Date(now.getFullYear(), now.getMonth() + offset, 1);
    end = new Date(now.getFullYear(), now.getMonth() + offset + 1, 1);
  } else if (period === 'yearly') {
    start = new Date(now.getFullYear() + offset, 0, 1);
    end = new Date(now.getFullYear() + offset + 1, 0, 1);
  } else {
    start = new Date(0);
    end = new Date(8640000000000000);
  }
  return { start, end };
}

function getFilteredEntries(period) {
  const { start, end } = getPeriodRange(period);
  return getExpenseEntries().filter(entry => {
    const d = new Date(entry.timestamp);
    return d >= start && d < end;
  });
}

function getPreviousEntries(period) {
  const { start, end } = getPeriodRange(period, -1);
  return getExpenseEntries().filter(entry => {
    const d = new Date(entry.timestamp);
    return d >= start && d < end;
  });
}

function sumEntries(entries) {
  return entries.reduce((sum, entry) => sum + Number(entry.amount || 0), 0);
}

function getActiveDays(entries) {
  return new Set(entries.map(entry => new Date(entry.timestamp).toDateString())).size;
}

function getCategoryStats(entries) {
  const map = new Map();
  entries.forEach(entry => {
    const category = entry.category || '❓ 其他';
    const current = map.get(category) || { category, total: 0, count: 0 };
    current.total += Number(entry.amount || 0);
    current.count += 1;
    map.set(category, current);
  });
  return Array.from(map.values()).sort((a, b) => b.total - a.total);
}

function renderCategoryBreakdown(entries, limit = 8) {
  const stats = getCategoryStats(entries).slice(0, limit);
  if (!stats.length) return `<div class="analytics-sub">${t('沒有分類資料')}</div>`;
  const max = Math.max(...stats.map(item => item.total), 1);
  const total = sumEntries(entries) || 1;
  return `<div class="category-breakdown">${stats.map(item => {
    const pct = Math.round(item.total / total * 100);
    const width = Math.max(3, item.total / max * 100);
    return `
      <div class="category-breakdown-row">
        <div>
          <div class="category-breakdown-name">${escapeHtml(t(item.category))}</div>
          <div class="category-breakdown-meta">${item.count} ${t('支出筆數')} · ${pct}%</div>
        </div>
        <div class="category-breakdown-amount">${formatCurrency(item.total)}</div>
        <div class="category-breakdown-bar-shell"><div class="category-breakdown-bar" style="width:${width}%"></div></div>
      </div>`;
  }).join('')}</div>`;
}

function makeTrendBuckets(period, entries) {
  const { start } = getPeriodRange(period);
  const buckets = [];
  if (period === 'daily') {
    for (let i = 0; i < 6; i++) buckets.push({ label: `${i * 4}:00`, total: 0, index: i });
    entries.forEach(entry => { buckets[Math.min(5, Math.floor(new Date(entry.timestamp).getHours() / 4))].total += Number(entry.amount || 0); });
  } else if (period === 'weekly') {
    for (let i = 0; i < 7; i++) {
      const d = new Date(start); d.setDate(start.getDate() + i);
      buckets.push({ label: d.toLocaleDateString(APP_LOCALE, { weekday: 'short' }), total: 0, index: i });
    }
    entries.forEach(entry => {
      const d = new Date(entry.timestamp);
      const idx = Math.max(0, Math.min(6, Math.floor((new Date(d.getFullYear(), d.getMonth(), d.getDate()) - start) / 86400000)));
      buckets[idx].total += Number(entry.amount || 0);
    });
  } else if (period === 'monthly') {
    const days = new Date(start.getFullYear(), start.getMonth() + 1, 0).getDate();
    for (let i = 1; i <= days; i++) buckets.push({ label: String(i), total: 0, index: i - 1 });
    entries.forEach(entry => { buckets[new Date(entry.timestamp).getDate() - 1].total += Number(entry.amount || 0); });
  } else {
    for (let i = 0; i < 12; i++) {
      const d = new Date(start.getFullYear(), i, 1);
      buckets.push({ label: d.toLocaleDateString(APP_LOCALE, { month: 'short' }), total: 0, index: i });
    }
    entries.forEach(entry => { buckets[new Date(entry.timestamp).getMonth()].total += Number(entry.amount || 0); });
  }
  return buckets;
}

function renderTrend(entries, period) {
  const buckets = makeTrendBuckets(period, entries);
  const max = Math.max(...buckets.map(bucket => bucket.total), 0);
  if (!max) return `<div class="analytics-sub">${t('沒有趨勢資料')}</div>`;
  return `<div class="trend-bars">${buckets.map(bucket => {
    const height = Math.max(2, bucket.total / max * 100);
    return `<div class="trend-bar-item" title="${escapeHtml(bucket.label)} · ${formatCurrency(bucket.total)}"><div class="trend-bar" style="height:${height}%"></div></div>`;
  }).join('')}</div>`;
}

function getBusiestDay(entries) {
  const byDay = new Map();
  entries.forEach(entry => {
    const key = new Date(entry.timestamp).toLocaleDateString(APP_LOCALE, { weekday: 'long' });
    byDay.set(key, (byDay.get(key) || 0) + 1);
  });
  return Array.from(byDay.entries()).sort((a, b) => b[1] - a[1])[0];
}

function formatDelta(current, previous) {
  if (previous <= 0 && current > 0) return { text: t('上期沒有支出'), cls: 'neutral' };
  if (previous <= 0) return { text: t('與上期持平'), cls: 'neutral' };
  const pct = Math.round((current - previous) / previous * 100);
  if (pct > 0) return { text: `+${pct}% ${t('較上期增加')}`, cls: 'positive' };
  if (pct < 0) return { text: `${Math.abs(pct)}% ${t('較上期減少')}`, cls: 'negative' };
  return { text: t('與上期持平'), cls: 'neutral' };
}

function setAnalyticsPeriod(period) {
  analyticsPeriod = period;
  document.querySelectorAll('.analytics-seg-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.period === period));
  renderAnalytics();
}

function renderHistory() {
  const body = document.getElementById('history-body');
  if (!body) return;
  const entries = getFilteredEntries(historyPeriod);

  if (entries.length === 0) {
    body.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">🧾</div>
        <div class="empty-state-title">${t('目前沒有支出')}</div>
        <div class="empty-state-text">${t('新增的支出會顯示在這裡。')}</div>
      </div>`;
    scheduleLocalize(body);
    return;
  }

  const total = sumEntries(entries);
  const avg = total / entries.length;
  const largest = entries.reduce((max, entry) => Number(entry.amount || 0) > Number(max.amount || 0) ? entry : max, entries[0]);
  const activeDays = getActiveDays(entries);
  const dailyAvg = total / Math.max(1, activeDays);

  let html = `
    <div class="stats-grid benjamin-summary">
      <div class="stat-card">
        <div class="stat-label">${t('總支出')}</div>
        <div class="stat-value">${formatCurrency(total)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">${t('支出筆數')}</div>
        <div class="stat-value">${entries.length}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">${t('平均每筆')}</div>
        <div class="stat-value">${formatCurrency(avg)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">${t('最高單筆')}</div>
        <div class="stat-value">${formatCurrency(largest.amount)}</div>
        <div class="stat-sub">${escapeHtml(largest.name || t('未命名支出'))}</div>
      </div>
      <div class="stat-card stat-card-wide">
        <div class="stat-label">${t('平均每筆')}</div>
        <div class="stat-value">${formatCurrency(dailyAvg)}</div>
        <div class="stat-sub">${activeDays} ${t('活躍天數')}</div>
      </div>
    </div>`;

  const groups = {};
  entries.forEach(entry => {
    const label = new Date(entry.timestamp).toLocaleDateString(APP_LOCALE, { weekday: 'long', month: 'short', day: 'numeric' });
    (groups[label] = groups[label] || []).push(entry);
  });

  for (const [dateLabel, group] of Object.entries(groups)) {
    html += `<div class="date-group"><div class="date-group-label">${escapeHtml(dateLabel)}</div>`;
    group.forEach(entry => { html += renderEntryCard(entry, 'history'); });
    html += '</div>';
  }

  body.innerHTML = html;
  scheduleLocalize(body);
}

function renderAnalytics() {
  const body = document.getElementById('analytics-body') || document.getElementById('watchlist-body');
  if (!body) return;
  const entries = getFilteredEntries(analyticsPeriod);
  const previousEntries = getPreviousEntries(analyticsPeriod);
  const total = sumEntries(entries);
  const previousTotal = sumEntries(previousEntries);
  const delta = formatDelta(total, previousTotal);
  const avg = entries.length ? total / entries.length : 0;
  const activeDays = getActiveDays(entries);
  const dailyAvg = activeDays ? total / activeDays : 0;
  const largest = entries.length ? entries.reduce((max, entry) => Number(entry.amount || 0) > Number(max.amount || 0) ? entry : max, entries[0]) : null;
  const topCategory = getCategoryStats(entries)[0];
  const busiestDay = getBusiestDay(entries);

  if (entries.length === 0) {
    body.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">📊</div>
        <div class="empty-state-title">${t('目前沒有分析資料')}</div>
        <div class="empty-state-text">${t('新增幾筆支出後，Benjamin 會整理分類、趨勢與比較。')}</div>
      </div>`;
    scheduleLocalize(body);
    return;
  }

  const now = new Date();
  const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
  const monthProjection = analyticsPeriod === 'monthly' ? total / Math.max(1, now.getDate()) * daysInMonth : null;

  body.innerHTML = `
    <div class="analytics-grid">
      <div class="analytics-card">
        <div class="analytics-card-title">${t('總支出')}</div>
        <div class="analytics-metric">${formatCurrency(total)}</div>
        <div class="analytics-sub analytics-delta ${delta.cls}">${delta.text}</div>
      </div>
      <div class="analytics-card">
        <div class="analytics-card-title">${t('平均每筆')}</div>
        <div class="analytics-metric">${formatCurrency(avg)}</div>
        <div class="analytics-sub">${entries.length} ${t('支出筆數')}</div>
      </div>
      <div class="analytics-card">
        <div class="analytics-card-title">${t('平均每筆')}</div>
        <div class="analytics-metric">${formatCurrency(dailyAvg)}</div>
        <div class="analytics-sub">${activeDays} ${t('活躍天數')}</div>
      </div>
      <div class="analytics-card">
        <div class="analytics-card-title">${monthProjection ? t('本月預估') : t('最高單筆')}</div>
        <div class="analytics-metric">${formatCurrency(monthProjection || (largest?.amount || 0))}</div>
        <div class="analytics-sub">${monthProjection ? t('依目前速度估算') : escapeHtml(largest?.name || t('未命名支出'))}</div>
      </div>
      <div class="analytics-card analytics-card-wide">
        <div class="analytics-card-title">${t('支出趨勢')}</div>
        ${renderTrend(entries, analyticsPeriod)}
      </div>
      <div class="analytics-card analytics-card-wide">
        <div class="analytics-card-title">${t('分類分析')}</div>
        ${renderCategoryBreakdown(entries, 10)}
      </div>
      <div class="analytics-card analytics-card-wide">
        <div class="analytics-card-title">${t('重點洞察')}</div>
        <div class="insight-list">
          <div class="insight-item"><span class="insight-icon">🏷️</span><span>${t('最大分類')}：<strong>${escapeHtml(t(topCategory?.category || '❓ 其他'))}</strong> · ${formatCurrency(topCategory?.total || 0)}</span></div>
          <div class="insight-item"><span class="insight-icon">💳</span><span>${t('最高單筆')}：<strong>${escapeHtml(largest?.name || t('未命名支出'))}</strong> · ${formatCurrency(largest?.amount || 0)}</span></div>
          <div class="insight-item"><span class="insight-icon">📅</span><span>${t('最常消費日')}：<strong>${escapeHtml(busiestDay?.[0] || '—')}</strong>${busiestDay ? ` · ${busiestDay[1]} ${t('支出筆數')}` : ''}</span></div>
          <div class="insight-item"><span class="insight-icon">↔️</span><span>${t('本期比較')}：<strong class="analytics-delta ${delta.cls}">${delta.text}</strong></span></div>
        </div>
      </div>
    </div>`;
  scheduleLocalize(body);
}

  const note = entry.notes ? escapeHtml(entry.notes) : escapeHtml(relativeTime(entry.timestamp));
  return `
    <div class="entry-card interactive" role="button" tabindex="0" onclick="openEntryModal('${entry.id}')" onkeydown="handleEntryCardKey(event, '${entry.id}')">
      <div class="entry-emoji">${escapeHtml(em)}</div>

        <div class="entry-category-label">${escapeHtml(t(category))}</div>

        <div class="entry-amount">${formatCurrency(entry.amount)}</div>

function saveEntryChanges(entryId) {
  const data = getCurrentUserData();
  const entries = data.entries || [];
  const idx = entries.findIndex(item => item.id === entryId);
  if (idx === -1) return;

  const amount = parseFloat(document.getElementById('entry-edit-amount').value) || 0;
  entries[idx] = {
    ...entries[idx],
    name: document.getElementById('entry-edit-name').value.trim() || t('未命名支出'),
    amount,
    category: document.getElementById('entry-edit-category').value,
    decision: 'expense',
    notes: document.getElementById('entry-edit-notes').value.trim()
  };

  data.entries = entries;
  saveCurrentUserData(data);
  closeModal();
  renderHistory();
  renderAnalytics();
  showSuccess();
}

function confirmDeleteEntry(entryId) {
  document.getElementById('modal-content').innerHTML = `
    <div class="modal-title">${t('要刪除這筆支出嗎？')}</div>
    <div class="confirm-text">${t('這會永久刪除此筆支出與備註。')} ${t('此操作無法復原。')}</div>
    <div class="modal-actions">
      <button class="btn-modal-cancel" type="button" onclick="closeModal()">${t('取消')}</button>
      <button class="btn-modal-danger" type="button" onclick="deleteEntry('${entryId}')">${t('刪除')}</button>
    </div>`;
  openModal();
}

function deleteEntry(entryId) {
  const data = getCurrentUserData();
  data.entries = (data.entries || []).filter(entry => entry.id !== entryId);
  saveCurrentUserData(data);
  closeModal();
  renderHistory();
  renderAnalytics();
}

function exportData() {
  const payload = {
    app: 'Benjamin',
    exportedAt: new Date().toISOString(),
    categories: getUserCategories(),
    entries: getExpenseEntries().map(entry => ({
      id: entry.id,
      name: entry.name,
      amount: Number(entry.amount || 0),
      category: entry.category,
      notes: entry.notes || '',
      timestamp: entry.timestamp
    }))
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'benjamin-expenses.json';
  a.click();
  URL.revokeObjectURL(url);
}

function showClearConfirm() {
  document.getElementById('modal-content').innerHTML = `
    <div class="modal-title">${t('要清除所有支出嗎？')}</div>

      <button class="btn-modal-danger" type="button" onclick="clearAllData()">${t('全部清除')}</button>
    </div>`;
  openModal();
}

function clearAllData() {
  const data = getCurrentUserData();
  data.entries = [];
  saveCurrentUserData(data);
  closeModal();
  renderHistory();
  renderAnalytics();
}
